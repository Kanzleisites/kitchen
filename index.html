<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Küche - Luxury Kitchen Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        #canvas {
            width: 100%;
            height: 100vh;
            display: block;
        }

        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            z-index: 10;
            max-width: 300px;
            border-left: 4px solid #00d4ff;
            backdrop-filter: blur(10px);
        }

        .info-panel h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .info-panel p {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
            color: #ddd;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            z-index: 10;
            font-size: 13px;
            border-left: 4px solid #00ff88;
            backdrop-filter: blur(10px);
        }

        .controls h3 {
            color: #00ff88;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .control-item {
            margin-bottom: 5px;
            color: #ddd;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 10px;
            color: white;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .loading h2 {
            margin-bottom: 15px;
            color: #00d4ff;
        }

        .spinner {
            border: 3px solid rgba(0, 212, 255, 0.3);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        button {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        button:hover {
            background: rgba(0, 212, 255, 0.4);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
        }

        button.active {
            background: rgba(0, 212, 255, 0.6);
        }

        .stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            z-index: 10;
            border-left: 4px solid #ffaa00;
            backdrop-filter: blur(10px);
        }

        .stats div {
            margin-bottom: 5px;
        }

        .stats div:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h2>Lädt 3D Modell...</h2>
        <div class="spinner"></div>
    </div>

    <div class="info-panel">
        <h1>🏠 Luxury Kitchen Island</h1>
        <p><strong>Meshy AI Kitchen Island</strong></p>
        <p>Hochmodernes 3D-Modell mit WebGL-Rendering</p>
    </div>

    <div class="buttons">
        <button id="toggleRotation">🔄 Auto-Rotation</button>
        <button id="toggleLights">💡 Beleuchtung</button>
        <button id="resetView">↺ View Reset</button>
        <button id="fullscreen">⛶ Vollbild</button>
    </div>

    <div class="controls">
        <h3>Steuerung</h3>
        <div class="control-item">🖱️ Drag = Drehen</div>
        <div class="control-item">🔄 Scroll = Zoom</div>
        <div class="control-item">🖱️ Rechts-Drag = Pan</div>
        <div class="control-item">Buttons = Effekte</div>
    </div>

    <div class="stats">
        <div>FPS: <span id="fps">60</span></div>
        <div>Vertices: <span id="vertices">0</span></div>
        <div>Triangles: <span id="triangles">0</span></div>
    </div>

    <canvas id="canvas"></canvas>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // ============ SCENE SETUP ============
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e27);
        scene.fog = new THREE.Fog(0x0a0e27, 100, 500);

        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: true,
            powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.body.appendChild(renderer.domElement);

        // ============ LIGHTING ============
        let lights = {
            ambient: null,
            directional: null,
            point1: null,
            point2: null
        };

        function setupLights() {
            // Ambient Light
            lights.ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(lights.ambient);

            // Main Directional Light
            lights.directional = new THREE.DirectionalLight(0xffffff, 1.2);
            lights.directional.position.set(5, 8, 5);
            lights.directional.castShadow = true;
            lights.directional.shadow.mapSize.width = 2048;
            lights.directional.shadow.mapSize.height = 2048;
            lights.directional.shadow.camera.left = -15;
            lights.directional.shadow.camera.right = 15;
            lights.directional.shadow.camera.top = 15;
            lights.directional.shadow.camera.bottom = -15;
            lights.directional.shadow.camera.far = 50;
            lights.directional.shadow.bias = -0.0001;
            scene.add(lights.directional);

            // Point Light 1 (Warm)
            lights.point1 = new THREE.PointLight(0xffaa55, 0.8, 20);
            lights.point1.position.set(-3, 3, 2);
            lights.point1.castShadow = true;
            scene.add(lights.point1);

            // Point Light 2 (Cool)
            lights.point2 = new THREE.PointLight(0x55aaff, 0.6, 20);
            lights.point2.position.set(3, 3, -2);
            lights.point2.castShadow = true;
            scene.add(lights.point2);
        }

        setupLights();

        // ============ GROUND ============
        const groundGeometry = new THREE.PlaneGeometry(50, 50);
        const groundMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1f3a,
            roughness: 0.8,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // ============ MODEL LOADING ============
        const loader = new THREE.GLTFLoader();
        let kitchenModel = null;

        loader.load(
            'Meshy_AI_Kitchen_Island_WebGL__0616185803_texture.glb',
            (gltf) => {
                kitchenModel = gltf.scene;
                kitchenModel.scale.set(1, 1, 1);
                kitchenModel.position.y = 0;

                // Enable shadows for all meshes
                kitchenModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(kitchenModel);

                // Hide loading screen
                document.getElementById('loading').style.display = 'none';

                // Update stats
                updateStats();

                console.log('✅ Kitchen model loaded successfully!');
            },
            (progress) => {
                const percent = (progress.loaded / progress.total * 100).toFixed(0);
                console.log(`Loading: ${percent}%`);
            },
            (error) => {
                console.error('❌ Error loading model:', error);
                document.getElementById('loading').innerHTML = `
                    <h2>❌ Fehler beim Laden</h2>
                    <p>${error.message}</p>
                `;
            }
        );

        // ============ CONTROLS ============
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2;
        controls.enablePan = true;

        // ============ STATE ============
        let state = {
            autoRotate: true,
            lightsOn: true,
            frameCount: 0,
            lastTime: Date.now(),
            fps: 60
        };

        // ============ BUTTONS ============
        document.getElementById('toggleRotation').addEventListener('click', () => {
            state.autoRotate = !state.autoRotate;
            controls.autoRotate = state.autoRotate;
            document.getElementById('toggleRotation').classList.toggle('active');
        });
        document.getElementById('toggleRotation').classList.add('active');

        document.getElementById('toggleLights').addEventListener('click', () => {
            state.lightsOn = !state.lightsOn;
            lights.ambient.intensity = state.lightsOn ? 0.5 : 0.1;
            lights.directional.intensity = state.lightsOn ? 1.2 : 0.3;
            lights.point1.intensity = state.lightsOn ? 0.8 : 0;
            lights.point2.intensity = state.lightsOn ? 0.6 : 0;
            document.getElementById('toggleLights').classList.toggle('active');
        });
        document.getElementById('toggleLights').classList.add('active');

        document.getElementById('resetView').addEventListener('click', () => {
            camera.position.set(0, 2, 5);
            controls.target.set(0, 1, 0);
            controls.update();
        });

        document.getElementById('fullscreen').addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        });

        // ============ STATS UPDATE ============
        function updateStats() {
            if (kitchenModel) {
                let vertices = 0, triangles = 0;
                kitchenModel.traverse((child) => {
                    if (child.isMesh && child.geometry) {
                        vertices += child.geometry.attributes.position.count;
                        triangles += child.geometry.index ? child.geometry.index.count / 3 : child.geometry.attributes.position.count / 3;
                    }
                });
                document.getElementById('vertices').textContent = vertices.toLocaleString();
                document.getElementById('triangles').textContent = Math.floor(triangles).toLocaleString();
            }
        }

        // ============ ANIMATION LOOP ============
        function animate() {
            requestAnimationFrame(animate);

            // FPS Counter
            state.frameCount++;
            const currentTime = Date.now();
            if (currentTime - state.lastTime >= 1000) {
                state.fps = state.frameCount;
                document.getElementById('fps').textContent = state.fps;
                state.frameCount = 0;
                state.lastTime = currentTime;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ============ RESPONSIVE ============
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============ KEYBOARD SHORTCUTS ============
        document.addEventListener('keydown', (e) => {
            if (e.key === 'r') document.getElementById('resetView').click();
            if (e.key === 'l') document.getElementById('toggleLights').click();
            if (e.key === 'a') document.getElementById('toggleRotation').click();
        });
    </script>
</body>
</html>
